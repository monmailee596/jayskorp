<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAYSKORP | Administration - Connexion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 450px;
            margin: 80px auto;
            background: rgba(10, 0, 0, 0.85);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid #b91c1c;
            text-align: center;
        }
        .login-container input {
            width: 100%;
            margin: 15px 0;
            padding: 14px;
            background: #1a0a0a;
            border: 1px solid #b3002d;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
        }
        .login-container button {
            width: 100%;
            margin-top: 10px;
        }
        .error-msg {
            color: #ff5e5e;
            margin-top: 15px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #888;
        }
    </style>
</head>
<body>
<div class="bg-red-dark"></div>
<div class="container">
    <nav class="navbar">
        <div class="logo"><h1>JAYSKORP</h1></div>
        <ul class="nav-links">
            <li><a href="index.html">ACCUEIL</a></li>
            <li><a href="actualites.html">ACTUALITÉS</a></li>
            <li><a href="map.html">MAP 1V1</a></li>
            <li><a href="effectif.html">EFFECTIF</a></li>
            <li><a href="tournois.html">TOURNOIS</a></li>
            <li><a href="recrutement.html">RECRUTEMENT</a></li>
            <li><a href="shop.html">SHOP</a></li>
        </ul>
    </nav>
    
    <div class="login-container">
        <i class="fas fa-lock" style="font-size: 3rem; color: #e63946; margin-bottom: 20px;"></i>
        <h2 style="font-family: 'Orbitron';">Accès Admin</h2>
        <p>Entrez vos identifiants pour accéder au panneau d'administration.</p>
        <input type="text" id="adminUsername" placeholder="Nom d'utilisateur" value="admin">
        <input type="password" id="adminPassword" placeholder="Mot de passe" value="admin">
        <button class="btn-primary" onclick="checkLogin()">Se connecter</button>
        <div id="errorMsg" class="error-msg"></div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour au site</a>
    </div>
</div>

<script>
    // 🔐 Identifiants admin
    const ADMIN_USERNAME = "admin";
    const ADMIN_PASSWORD = "admin";
    
    function checkLogin() {
        const username = document.getElementById('adminUsername').value;
        const password = document.getElementById('adminPassword').value;
        const errorDiv = document.getElementById('errorMsg');
        
        if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
            localStorage.setItem('adminLoggedIn', 'true');
            window.location.href = 'admin-panel.html';
        } else {
            errorDiv.innerHTML = '❌ Identifiant ou mot de passe incorrect. Accès refusé.';
        }
    }
</script>
</body>
</html>
