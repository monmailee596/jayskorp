<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAYSKORP | Panneau Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 900px; margin: 40px auto; }
        .admin-card { background: rgba(10, 0, 0, 0.85); border-radius: 24px; padding: 30px; border: 1px solid #b91c1c; margin-bottom: 30px; }
        .admin-card h3 { font-family: 'Orbitron'; margin-bottom: 20px; color: #e63946; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #1a0a0a; border: 1px solid #b3002d; border-radius: 12px; color: white; font-family: inherit; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .news-item { background: #0a0505; border: 1px solid #b3002d; border-radius: 16px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .news-item-content { flex: 1; }
        .news-item-title { font-weight: bold; font-size: 1.1rem; }
        .news-item-date { color: #ff5e5e; font-size: 0.8rem; }
        .delete-btn { background: #b3002d; border: none; padding: 8px 15px; border-radius: 40px; color: white; cursor: pointer; }
        .delete-btn:hover { background: #ff3a3a; }
        .logout-btn { background: transparent; border: 1px solid #e63946; padding: 10px 20px; border-radius: 40px; color: #ff5e5e; cursor: pointer; }
        .success-msg { background: rgba(0, 200, 0, 0.2); border: 1px solid green; padding: 10px; border-radius: 12px; margin-bottom: 20px; }
        .error-msg { background: rgba(200, 0, 0, 0.2); border: 1px solid #ff3a3a; padding: 10px; border-radius: 12px; margin-bottom: 20px; }
        .btn-primary { background: linear-gradient(95deg, #e03a3a, #9e0000); color: white; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-family: 'Orbitron', monospace; font-weight: bold; }
        .btn-primary:hover { background: linear-gradient(95deg, #ff4d4d, #b00000); }
        .loading { text-align: center; padding: 40px; color: #ff8888; }
    </style>
</head>
<body>
<div class="bg-red-dark"></div>
<div class="container">
    <nav class="navbar">
        <div class="logo"><h1>JAYSKORP - ADMIN</h1></div>
        <ul class="nav-links">
            <li><a href="index.html">ACCUEIL</a></li>
            <li><a href="actualites.html">ACTUALITÉS</a></li>
            <li><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button></li>
        </ul>
    </nav>

    <div class="admin-container">
        <div id="msgContainer"></div>
        
        <div class="admin-card">
            <h3><i class="fas fa-plus-circle"></i> Ajouter une actualité</h3>
            <div class="form-group">
                <label>Titre</label>
                <input type="text" id="newsTitle" placeholder="Ex: Nouvelle victoire en FNCS !">
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="text" id="newsDate" placeholder="Ex: 15 DECEMBRE 2026" value="15 DECEMBRE 2026">
            </div>
            <div class="form-group">
                <label>Contenu</label>
                <textarea id="newsContent" placeholder="Décrivez l'actualité..."></textarea>
            </div>
            <button class="btn-primary" onclick="addNews()">Publier l'actualité</button>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-list"></i> Actualités existantes</h3>
            <div id="newsList"><div class="loading">Chargement...</div></div>
        </div>
    </div>
</div>

<script>
    if (localStorage.getItem('adminLoggedIn') !== 'true') {
        window.location.href = 'admin-login.html';
    }

    let newsItems = [];

    async function loadNews() {
        try {
            const response = await fetch('news.json?t=' + Date.now());
            newsItems = await response.json();
            displayNews();
        } catch (error) {
            document.getElementById('newsList').innerHTML = '<p class="error-msg">Erreur de chargement. Rafraîchissez la page.</p>';
        }
    }

    function displayNews() {
        const container = document.getElementById('newsList');
        if (!container) return;
        
        if (newsItems.length === 0) {
            container.innerHTML = '<p style="color:#888;">Aucune actualité. Ajoutez-en une !</p>';
            return;
        }
        
        container.innerHTML = '';
        for (let i = 0; i < newsItems.length; i++) {
            const item = newsItems[i];
            const div = document.createElement('div');
            div.className = 'news-item';
            div.innerHTML = `
                <div class="news-item-content">
                    <div class="news-item-title">${escapeHtml(item.title)}</div>
                    <div class="news-item-date">${escapeHtml(item.date)}</div>
                    <div style="font-size:0.85rem; margin-top:5px;">${escapeHtml(item.content.substring(0, 100))}${item.content.length > 100 ? '...' : ''}</div>
                </div>
                <button class="delete-btn" onclick="deleteNews(${i})"><i class="fas fa-trash"></i> Supprimer</button>
            `;
            container.appendChild(div);
        }
    }

    async function addNews() {
        const title = document.getElementById('newsTitle').value.trim();
        const date = document.getElementById('newsDate').value.trim();
        const content = document.getElementById('newsContent').value.trim();
        
        if (!title || !content) {
            showMessage('Veuillez remplir le titre et le contenu.', 'error');
            return;
        }
        
        const newNews = { title, date, content };
        newsItems.unshift(newNews);
        
        await saveNewsToGitHub();
        displayNews();
        
        document.getElementById('newsTitle').value = '';
        document.getElementById('newsContent').value = '';
        
        showMessage('✅ Actualité ajoutée avec succès !', 'success');
    }

    async function deleteNews(index) {
        if (confirm('Supprimer cette actualité ?')) {
            newsItems.splice(index, 1);
            await saveNewsToGitHub();
            displayNews();
            showMessage('✅ Actualité supprimée', 'success');
        }
    }

    async function saveNewsToGitHub() {
        const content = JSON.stringify(newsItems, null, 2);
        const encodedContent = btoa(unescape(encodeURIComponent(content)));
        
        // Obtenir le SHA du fichier actuel
        const fileResponse = await fetch('https://api.github.com/repos/monnailee596/jayskorp/contents/news.json');
        const fileData = await fileResponse.json();
        const sha = fileData.sha;
        
        const response = await fetch('https://api.github.com/repos/monnailee596/jayskorp/contents/news.json', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'token ' + prompt("Entrez votre token GitHub (généré sur https://github.com/settings/tokens) avec accès repo:")
            },
            body: JSON.stringify({
                message: "Mise à jour des actualités",
                content: encodedContent,
                sha: sha
            })
        });
        
        if (!response.ok) {
            throw new Error('Erreur de sauvegarde');
        }
    }

    function showMessage(msg, type) {
        const container = document.getElementById('msgContainer');
        if (!container) return;
        container.innerHTML = `<div class="${type === 'error' ? 'error-msg' : 'success-msg'}">${msg}</div>`;
        setTimeout(() => {
            container.innerHTML = '';
        }, 3000);
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function logout() {
        localStorage.setItem('adminLoggedIn', 'false');
        window.location.href = 'admin-login.html';
    }

    loadNews();
</script>
</body>
</html>
